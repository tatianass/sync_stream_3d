name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format Check
        run: uv run ruff format --check syncstream/

      - name: Security Scan (Bandit)
        run: uv run bandit -r syncstream/  # Only scan the logic, not the tests

      - name: Run Unit Tests
        run: uv run pytest tests/test_pipeline_unit.py

      - name: Run Integration Tests
        run: uv run pytest tests/test_pipeline_integration.py

  docker-build-check:
    needs: quality-and-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false  # Only check if it builds correctly
          tags: syncstream-converter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
